defaultNamespace: metallb-system
helm:
  chart: "metallb"
  repo: "https://suse-edge.github.io/charts"
  version: "0.13.10"
  releaseName: "metallb"
targetCustomizations:
- name: local
  clusterSelector:
    matchLabels:
      management.cattle.io/cluster-display-name: local
  kustomize:
    dir: overlays/local
# https://fleet.rancher.io/bundle-diffs
diff:
  comparePatches:
  - apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: addresspools.metallb.io
    operations:
    - {"op":"remove", "path":"/spec/conversion/webhook/clientConfig/caBundle"}
  - apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: bgppeers.metallb.io
    operations:
    - {"op":"remove", "path":"/spec/conversion/webhook/clientConfig/caBundle"}
  - apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: ipaddresspools.metallb.io  # <--- Added
    operations:
    - {"op":"remove", "path":"/spec/conversion/webhook/clientConfig/caBundle"}
  - apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: l2advertisements.metallb.io # <--- Added
    operations:
    - {"op":"remove", "path":"/spec/conversion/webhook/clientConfig/caBundle"}
  - apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: bfdprofiles.metallb.io      # <--- Added
    operations:
    - {"op":"remove", "path":"/spec/conversion/webhook/clientConfig/caBundle"}
  - apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: communitytoolsets.metallb.io # <--- Added
    operations:
    - {"op":"remove", "path":"/spec/conversion/webhook/clientConfig/caBundle"}
